    <script>
        // Génération automatique des cartes certifications
        const grid = document.getElementById('certifications-grid');
        certifications.forEach(certif => {
            const targetAttr = certif.ouvrirNouvelOnglet ? 'target="_blank" rel="noopener noreferrer"' : '';

            // Détecte si c'est un SVG inline ou un chemin d'image
            const imageHTML = certif.image.trim().startsWith('<svg')
                ? certif.image
                : `<img src="${certif.image}" alt="${certif.titre}">`;

            // Bouton certificat affiché uniquement si lien différent de "#"
            const certifBtn = certif.lienCertif && certif.lienCertif !== '#'
                ? `<a href="${certif.lienCertif}" class="certif-link" ${targetAttr}>→ Voir le certificat</a>`
                : '';   

            const card = `
                <div class="certif-card">
                    <div class="certif-image">
                        ${imageHTML}
                    </div>
                    <div class="certif-content">
                        <div class="certif-meta">
                            <span class="certif-organisme">${certif.organisme}</span>
                            <span class="certif-date">${certif.date}</span>
                        </div>
                        <h3 class="certif-title">${certif.titre}</h3>
                        <p class="certif-description">${certif.description}</p>
                        <div class="certif-footer">
                            <a href="${certif.lienSite}" class="certif-link" ${targetAttr}>→ Site officiel</a>
                            ${certifBtn}
                        </div>
                    </div>
                </div>
            `;
            grid.insertAdjacentHTML('beforeend', card);
        });
    </script>
